<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <h1>Crie sua Conta Globo, é grátis</h1>
    <p>Uma conta única e gratuita para todos os produtos Globo. <a href="">Entenda como a Conta Globo funciona.</a></p>

    <form>
        <label for="name">Nome completo</label><br>
        <input id="name" type="text" placeholder="Digite seu nome completo" required><br><br>
        <label for="email">Informe seu email</label><br>
        <input id="email" type="email" placeholder="Ex: @gmail, @outlook, @yahoo, etec." required><br><br>
        <label for="date"> Data de nascimento</label><br>
        <input id="date" type="text" pattern="\{3}-\{3}-\{4}" required><br><br>
        <button>Próximo</button><br><br>
         <p>Este site é protegido pelo hCaptcha e está sujeito a sua <a href="">Política de Privacidade</a> e <a href=""> Termos de Uso</a> .</p>

    </form>
</body>
</html>
